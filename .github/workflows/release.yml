name: Release Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release assets
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      ANDROID_VERSION_CODE: ${{ github.run_number }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/mobile/android/app/release.keystore

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web dependencies
        run: npm ci

      - name: Build web package
        run: npm run build

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Type-check mobile app
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Sync mobile version from release tag
        run: node scripts/sync-mobile-version.mjs

      - name: Generate Android project
        working-directory: mobile
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Decode Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Configure Android release signing
        run: node scripts/configure-android-signing.mjs

      - name: Build Android APK and AAB
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Collect release assets
        run: |
          VERSION="${RELEASE_TAG#v}"
          mkdir -p release
          (cd dist && zip -r "../release/ledger-journal-web-${VERSION}.zip" .)
          cp mobile/android/app/build/outputs/apk/release/app-release.apk "release/ledger-journal-android-${VERSION}.apk"
          cp mobile/android/app/build/outputs/bundle/release/app-release.aab "release/ledger-journal-android-${VERSION}.aab"
          sha256sum release/* > release/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release/*
